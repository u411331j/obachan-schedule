<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おばあちゃんの施設スケジュール</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:  #fdf9f6;
    --ink:    #2d2020;
    --muted:  #9a8585;
    --shadow: 0 2px 16px rgba(100,60,80,0.10);
    --short-color: #e8758a;
    --masa-color:  #6d9eeb;
    --atsu-color:  #6daa8f;
    --short-light: #fce8ec;
    --masa-light:  #ddeeff;
    --atsu-light:  #e4f4ec;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--cream); color: var(--ink);
    min-height: 100vh; padding-bottom: 80px;
  }
 
  /* ヘッダー */
  header {
    background: linear-gradient(160deg, #f9d0d8 0%, #fce8ec 50%, #ddeeff 100%);
    padding: 28px 20px 18px; text-align: center;
    border-bottom: 1px solid rgba(200,150,180,0.2);
  }
  header .h-emoji { font-size: 50px; display: block; margin-bottom: 6px; }
  header h1 { font-size: 22px; font-weight: 900; color: #c04060; line-height: 1.4; }
  .sync-badge {
    display: inline-block; margin-top: 6px;
    background: rgba(110,158,235,0.18); border: 1.5px solid var(--masa-color);
    border-radius: 20px; padding: 3px 12px;
    font-size: 12px; color: var(--masa-color); font-weight: 700;
  }
 
  /* 凡例 */
  .legend {
    display: flex; justify-content: center; gap: 14px;
    padding: 12px 16px; flex-wrap: wrap;
    max-width: 460px; margin: 0 auto;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700; }
  .legend-dot  { width: 14px; height: 14px; border-radius: 50%; }
  .legend-dot.short { background: var(--short-color); }
  .legend-dot.masa  { background: var(--masa-color); }
  .legend-dot.atsu  { background: var(--atsu-color); }
 
  /* カレンダー */
  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px 8px; max-width: 460px; margin: 0 auto;
  }
  .cal-arrow {
    background: white; border: 2px solid #f0dde2; color: #c04060;
    border-radius: 50%; width: 44px; height: 44px; font-size: 20px; font-weight: 900;
    cursor: pointer; box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
  }
  .cal-nav h2 { font-size: 19px; font-weight: 900; }
  .cal-wrap { max-width: 460px; margin: 0 auto; padding: 0 12px; }
  .weekdays {
    display: grid; grid-template-columns: repeat(7,1fr);
    text-align: center; font-size: 12px; font-weight: 700;
    color: var(--muted); margin-bottom: 5px;
  }
  .weekdays span:first-child { color: #c06070; }
  .weekdays span:last-child  { color: #6070c0; }
  .days-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .day-cell {
    aspect-ratio: 1; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; font-weight: 700;
    background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: transform 0.12s; user-select: none; -webkit-tap-highlight-color: transparent;
    gap: 1px;
  }
  .day-cell:active { transform: scale(0.88); }
  .day-cell.empty  { background: transparent; box-shadow: none; cursor: default; }
  .day-cell.sunday   { color: #c06070; }
  .day-cell.saturday { color: #6070c0; }
  .day-cell.today    { border: 2.5px solid #c04060; }
  .day-cell.bg-short { background: linear-gradient(145deg, var(--short-color), #f0a0b0); color: white !important; }
  .day-cell.bg-masa  { background: linear-gradient(145deg, var(--masa-color),  #90b8f0); color: white !important; }
  .day-cell.bg-atsu  { background: linear-gradient(145deg, var(--atsu-color),  #8ecaae); color: white !important; }
  .day-cell.bg-multi { background: linear-gradient(145deg, #b090c8, #d0a8e0);  color: white !important; }
  .cell-dots { display: flex; gap: 2px; justify-content: center; }
  .cell-dot  { width: 6px; height: 6px; border-radius: 50%; }
  .cell-dot.short { background: var(--short-color); }
  .cell-dot.masa  { background: var(--masa-color); }
  .cell-dot.atsu  { background: var(--atsu-color); }
 
  /* フォーム */
  .form-section { max-width: 460px; margin: 16px auto 0; padding: 0 14px; }
  .form-card {
    background: white; border-radius: 22px; padding: 20px 18px;
    box-shadow: var(--shadow); border: 2px solid #f0dde2;
  }
  .form-card h3 { font-size: 16px; font-weight: 900; color: #c04060; margin-bottom: 16px; }
  .field-label { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 7px; display: block; }
 
  /* カテゴリ */
  .cat-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .cat-btn {
    flex: 1; border: 2.5px solid; border-radius: 14px;
    padding: 12px 6px; font-size: 14px; font-weight: 900;
    font-family: 'Zen Maru Gothic', sans-serif; cursor: pointer;
    text-align: center; background: white; line-height: 1.3; transition: all 0.15s;
  }
  .cat-btn.short { border-color: var(--short-color); color: var(--short-color); }
  .cat-btn.masa  { border-color: var(--masa-color);  color: var(--masa-color); }
  .cat-btn.atsu  { border-color: var(--atsu-color);  color: var(--atsu-color); }
  .cat-btn.short.active { background: var(--short-color); color: white; }
  .cat-btn.masa.active  { background: var(--masa-color);  color: white; }
  .cat-btn.atsu.active  { background: var(--atsu-color);  color: white; }
 
  /* 日付 */
  .date-range-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .date-range-row input[type="date"] {
    flex: 1; font-size: 16px; font-family: 'Zen Maru Gothic', sans-serif;
    border: 2px solid #f0dde2; border-radius: 12px;
    padding: 12px 10px; color: var(--ink); background: #fff8f9; outline: none;
  }
  .date-range-row input[type="date"]:focus { border-color: #c04060; }
  .range-tilde { font-size: 22px; font-weight: 900; color: var(--muted); flex-shrink: 0; }
 
  /* 時間（正和・敦子のみ表示） */
  #timeSection { margin-bottom: 4px; }
  .time-range-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .time-select {
    flex: 1; font-size: 20px; font-family: 'Zen Maru Gothic', sans-serif;
    border: 2px solid #f0dde2; border-radius: 12px;
    padding: 12px 8px; color: var(--ink); background: #fff8f9; outline: none;
    text-align: center; cursor: pointer; appearance: none; -webkit-appearance: none;
  }
  .time-select:focus { border-color: #c04060; }
  .time-tilde { font-size: 22px; font-weight: 900; color: var(--muted); flex-shrink: 0; }
  .quick-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
  .quick-btn {
    background: #fff5f7; border: 2px solid #f0dde2; color: #c04060;
    border-radius: 30px; padding: 8px 14px; font-size: 14px; font-weight: 700;
    font-family: 'Zen Maru Gothic', sans-serif; cursor: pointer; white-space: nowrap;
  }
  .quick-btn:active { background: #e8758a; color: white; border-color: #e8758a; }
 
  .btn-add {
    width: 100%; background: linear-gradient(135deg, #e8758a, #c04060);
    color: white; border: none; border-radius: 14px;
    padding: 16px; font-size: 18px; font-weight: 900;
    font-family: 'Zen Maru Gothic', sans-serif; cursor: pointer;
    box-shadow: 0 5px 18px rgba(200,60,90,0.28); letter-spacing: 0.04em;
  }
  .btn-add:active { transform: scale(0.97); }
  .btn-add:disabled { opacity: 0.55; }
 
  /* リスト */
  .list-section { max-width: 460px; margin: 20px auto 0; padding: 0 14px; }
  .tab-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab-btn {
    border: 2px solid; border-radius: 30px; padding: 7px 14px;
    font-size: 14px; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif;
    cursor: pointer; background: white; transition: all 0.13s;
  }
  .tab-btn.all   { border-color: #bbb; color: #888; }
  .tab-btn.short { border-color: var(--short-color); color: var(--short-color); }
  .tab-btn.masa  { border-color: var(--masa-color);  color: var(--masa-color); }
  .tab-btn.atsu  { border-color: var(--atsu-color);  color: var(--atsu-color); }
  .tab-btn.all.active   { background: #888;              color: white; }
  .tab-btn.short.active { background: var(--short-color); color: white; }
  .tab-btn.masa.active  { background: var(--masa-color);  color: white; }
  .tab-btn.atsu.active  { background: var(--atsu-color);  color: white; }
 
  .schedule-list { list-style: none; display: flex; flex-direction: column; gap: 9px; }
 
  /* ショートステイ：まとめカード */
  .short-block {
    background: white; border-radius: 18px; padding: 16px 16px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow); border-left: 5px solid var(--short-color);
    animation: pop 0.2s ease;
  }
  .short-block-icon { font-size: 28px; flex-shrink: 0; }
  .short-block-info { flex: 1; }
  .short-block-cat  {
    font-size: 11px; font-weight: 900; padding: 2px 8px; border-radius: 10px;
    display: inline-block; margin-bottom: 4px;
    background: var(--short-light); color: var(--short-color);
  }
  .short-block-range { font-size: 20px; font-weight: 900; color: var(--short-color); line-height: 1.3; }
  .short-block-days  { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .btn-del-block {
    background: var(--short-light); border: 2px solid #f0b0bc; color: #c04060;
    border-radius: 10px; padding: 9px 12px; font-size: 16px;
    font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; cursor: pointer; flex-shrink: 0;
  }
  .btn-del-block:active { background: #fcc; }
 
  /* 正和・敦子：通常カード */
  .schedule-item {
    background: white; border-radius: 16px; padding: 14px 14px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow); animation: pop 0.2s ease;
  }
  .schedule-item.masa { border-left: 5px solid var(--masa-color); }
  .schedule-item.atsu { border-left: 5px solid var(--atsu-color); }
  @keyframes pop { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .item-icon { font-size: 26px; flex-shrink: 0; }
  .item-info { flex: 1; min-width: 0; }
  .item-cat  {
    font-size: 11px; font-weight: 900; padding: 2px 8px; border-radius: 10px;
    display: inline-block; margin-bottom: 3px;
  }
  .item-cat.masa { background: var(--masa-light); color: var(--masa-color); }
  .item-cat.atsu { background: var(--atsu-light); color: var(--atsu-color); }
  .item-date { font-size: 15px; font-weight: 700; color: var(--ink); }
  .item-time { font-size: 20px; font-weight: 900; margin-top: 2px; }
  .item-time.masa { color: var(--masa-color); }
  .item-time.atsu { color: var(--atsu-color); }
  .btn-del {
    background: #fff0f2; border: 2px solid #f0b0bc; color: #c04060;
    border-radius: 10px; padding: 9px 12px; font-size: 16px;
    font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; cursor: pointer; flex-shrink: 0;
  }
  .btn-del:active { background: #fcc; }
 
  .empty-msg   { text-align: center; color: #d0c0c0; font-size: 15px; padding: 28px 0; }
  .loading-msg { text-align: center; color: #ccc; font-size: 14px; padding: 22px 0; }
 
  .toast {
    position: fixed; bottom: 26px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2d2020; color: white; padding: 13px 26px;
    border-radius: 50px; font-size: 15px; font-weight: 700;
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    transition: transform 0.28s, opacity 0.28s;
    opacity: 0; z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>
 
<header>
  <span class="h-emoji">👵</span>
  <h1>おばあちゃんの施設スケジュール</h1>
  <span class="sync-badge">☁️ みんなでリアルタイム共有中</span>
</header>
 
<div class="legend">
  <div class="legend-item"><div class="legend-dot short"></div>ショートステイ</div>
  <div class="legend-item"><div class="legend-dot masa"></div>正和が行く日</div>
  <div class="legend-item"><div class="legend-dot atsu"></div>敦子が行く日</div>
</div>
 
<!-- カレンダー -->
<div class="cal-nav">
  <button class="cal-arrow" id="prevBtn">‹</button>
  <h2 id="calTitle"></h2>
  <button class="cal-arrow" id="nextBtn">›</button>
</div>
<div class="cal-wrap">
  <div class="weekdays">
    <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>
 
<!-- フォーム -->
<div class="form-section">
  <div class="form-card">
    <h3>📝 スケジュールを登録</h3>
 
    <span class="field-label">👤 誰の予定？</span>
    <div class="cat-row">
      <button class="cat-btn short active" onclick="selectCat('short',this)">🏥<br>ショート<br>ステイ</button>
      <button class="cat-btn masa"         onclick="selectCat('masa', this)">👨<br>正和が<br>行く日</button>
      <button class="cat-btn atsu"         onclick="selectCat('atsu', this)">👩<br>敦子が<br>行く日</button>
    </div>
 
    <span class="field-label" id="dateLabel">📅 日付（連続する日もまとめて選べます）</span>
    <!-- ショートステイ用：連続日 -->
    <div class="date-range-row" id="dateRangeRow">
      <input type="date" id="dateStart">
      <span class="range-tilde">〜</span>
      <input type="date" id="dateEnd">
    </div>
    <!-- 正和・敦子用：1日のみ -->
    <div id="dateSingleRow" style="display:none;margin-bottom:14px;">
      <input type="date" id="dateSingle" style="width:100%;font-size:20px;font-family:'Zen Maru Gothic',sans-serif;border:2px solid #f0dde2;border-radius:12px;padding:14px 16px;color:var(--ink);background:#fff8f9;outline:none;">
    </div>
 
    <!-- 時間（正和・敦子のみ） -->
    <div id="timeSection">
      <span class="field-label">🕐 時間（30分単位）</span>
      <div class="time-range-row">
        <select class="time-select" id="timeStart"></select>
        <span class="time-tilde">〜</span>
        <select class="time-select" id="timeEnd"></select>
      </div>
      <div class="quick-row">
        <button class="quick-btn" onclick="setTime('09:00','12:00')">午前（9〜12時）</button>
        <button class="quick-btn" onclick="setTime('13:00','17:00')">午後（13〜17時）</button>
        <button class="quick-btn" onclick="setTime('09:00','17:00')">終日（9〜17時）</button>
        <button class="quick-btn" onclick="setTime('10:00','15:00')">10〜15時</button>
        <button class="quick-btn" onclick="setTime('10:00','16:00')">10〜16時</button>
      </div>
    </div>
 
    <button class="btn-add" id="addBtn" onclick="addItems()">➕ 登録する</button>
  </div>
</div>
 
<!-- リスト -->
<div class="list-section">
  <h3 style="font-size:16px;font-weight:900;margin-bottom:10px;">📋 登録済みのスケジュール</h3>
  <div class="tab-row">
    <button class="tab-btn all   active" onclick="setTab('all',   this)">すべて</button>
    <button class="tab-btn short"        onclick="setTab('short', this)">🏥 ショートステイ</button>
    <button class="tab-btn masa"         onclick="setTab('masa',  this)">👨 正和</button>
    <button class="tab-btn atsu"         onclick="setTab('atsu',  this)">👩 敦子</button>
  </div>
  <ul class="schedule-list" id="scheduleList">
    <li class="loading-msg">読み込み中…</li>
  </ul>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
  const GAS_URL   = 'https://script.google.com/macros/s/AKfycbzpMn8dQ_U8y0HrfJqc5N04057bgjrj0nYK_wGyLvDMwNJgvpAKZ65WBYOSxlvsj7-ktg/exec';
  const DAYS_JA   = ['日','月','火','水','木','金','土'];
  const CAT_LABEL = { short:'ショートステイ', masa:'正和が行く日', atsu:'敦子が行く日' };
  const CAT_ICON  = { short:'🏥', masa:'👨', atsu:'👩' };
 
  let items = [], currentYear, currentMonth;
  let selectedCat = 'short', currentTab = 'all';
 
  // 時間セレクト生成
  function buildTimeOptions(el, def) {
    el.innerHTML = '';
    for (let h=0; h<24; h++) {
      for (let m of [0,30]) {
        const val = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = `${h}時${m===0?'':'30分'}`;
        if (val===def) opt.selected = true;
        el.appendChild(opt);
      }
    }
  }
 
  // カテゴリ選択
  function selectCat(cat, btn) {
    selectedCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const isShort = cat === 'short';
    // ショートステイは時間非表示・連続日UI、正和・敦子は時間表示・1日UI
    document.getElementById('timeSection').style.display   = isShort ? 'none'  : 'block';
    document.getElementById('dateRangeRow').style.display  = isShort ? 'flex'  : 'none';
    document.getElementById('dateSingleRow').style.display = isShort ? 'none'  : 'block';
    document.getElementById('dateLabel').textContent = isShort
      ? '📅 日付（連続する日もまとめて選べます）'
      : '📅 日付';
  }
 
  function setTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }
 
  function setTime(s, e) {
    document.getElementById('timeStart').value = s;
    document.getElementById('timeEnd').value   = e;
  }
 
  function gasGet(params) {
    return fetch(GAS_URL + '?' + new URLSearchParams(params)).then(r => r.json());
  }
 
  function startApp() {
    const now = new Date();
    currentYear = now.getFullYear(); currentMonth = now.getMonth();
    const today = toDateStr(now);
    document.getElementById('dateStart').value  = today;
    document.getElementById('dateEnd').value    = today;
    document.getElementById('dateSingle').value = today;
    buildTimeOptions(document.getElementById('timeStart'), '10:00');
    buildTimeOptions(document.getElementById('timeEnd'),   '15:00');
    // 初期はショートステイ：時間非表示・連続日UI表示
    document.getElementById('timeSection').style.display   = 'none';
    document.getElementById('dateRangeRow').style.display  = 'flex';
    document.getElementById('dateSingleRow').style.display = 'none';
    document.getElementById('dateLabel').textContent = '📅 日付（連続する日もまとめて選べます）';
 
    document.getElementById('prevBtn').onclick = () => { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} renderCalendar(); };
    document.getElementById('nextBtn').onclick = () => { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(); };
    loadItems();
  }
 
  function loadItems() {
    gasGet({ action:'list' })
      .then(data => {
        items = (data.items||[]).sort((a,b) =>
          a.date===b.date ? (a.timeStart||'').localeCompare(b.timeStart||'') : a.date.localeCompare(b.date));
        renderCalendar(); renderList();
      })
      .catch(() => showToast('⚠️ 読み込みに失敗しました'));
  }
 
  // カレンダー
  function renderCalendar() {
    const grid = document.getElementById('daysGrid');
    document.getElementById('calTitle').textContent = `${currentYear}年 ${currentMonth+1}月`;
    grid.innerHTML = '';
    const todayStr = toDateStr(new Date());
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
    const prefix = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
    const dateMap = {};
    items.filter(it => it.date.startsWith(prefix)).forEach(it => {
      if (!dateMap[it.date]) dateMap[it.date] = new Set();
      dateMap[it.date].add(it.category);
    });
    for (let i=0;i<firstDay;i++){const el=document.createElement('div');el.className='day-cell empty';grid.appendChild(el);}
    for (let d=1;d<=daysInMonth;d++){
      const ds = `${prefix}-${String(d).padStart(2,'0')}`;
      const dow = new Date(ds+'T00:00:00').getDay();
      const cats = dateMap[ds]?[...dateMap[ds]]:[];
      const el = document.createElement('div');
      let cls = 'day-cell';
      if(dow===0) cls+=' sunday'; if(dow===6) cls+=' saturday';
      if(ds===todayStr) cls+=' today';
      if(cats.length===1) cls+=` bg-${cats[0]}`;
      else if(cats.length>1) cls+=' bg-multi';
      el.className = cls;
      const dots = cats.length ? `<div class="cell-dots">${cats.map(c=>`<div class="cell-dot ${c}"></div>`).join('')}</div>` : '';
      el.innerHTML = `<span>${d}</span>${dots}`;
      el.addEventListener('click', () => {
        document.getElementById('dateStart').value  = ds;
        document.getElementById('dateEnd').value    = ds;
        document.getElementById('dateSingle').value = ds;
        document.querySelector('.form-section').scrollIntoView({behavior:'smooth'});
      });
      grid.appendChild(el);
    }
  }
 
  // 追加
  async function addItems() {
    const isShort = selectedCat === 'short';
    let dates = [];
    let timeStart='', timeEnd='';
 
    if (isShort) {
      // ショートステイ：連続日
      const dateStart = document.getElementById('dateStart').value;
      const dateEnd   = document.getElementById('dateEnd').value;
      if (!dateStart||!dateEnd) { showToast('⚠️ 日付を選んでください'); return; }
      let cur = new Date(dateStart+'T00:00:00');
      const end = new Date(dateEnd+'T00:00:00');
      while(cur<=end){ dates.push(toDateStr(cur)); cur.setDate(cur.getDate()+1); }
    } else {
      // 正和・敦子：1日のみ
      const dateSingle = document.getElementById('dateSingle').value;
      if (!dateSingle) { showToast('⚠️ 日付を選んでください'); return; }
      dates = [dateSingle];
      timeStart = document.getElementById('timeStart').value;
      timeEnd   = document.getElementById('timeEnd').value;
      if (timeStart >= timeEnd) { showToast('⚠️ 終了は開始より後にしてください'); return; }
    }
 
    setLoading(true);
    let added=0;
    for (const date of dates) {
      const id = isShort
        ? `${date}_${selectedCat}`
        : `${date}_${selectedCat}_${timeStart}_${timeEnd}`;
      try {
        await gasGet({action:'add', id, date, timeStart, timeEnd, category:selectedCat});
        if (!items.find(it=>it.id===id)) { items.push({id,date,timeStart,timeEnd,category:selectedCat}); added++; }
      } catch(e){}
    }
    items.sort((a,b)=>a.date===b.date?(a.timeStart||'').localeCompare(b.timeStart||''):a.date.localeCompare(b.date));
    renderCalendar(); renderList();
    showToast(added>0 ? `✅ ${added > 1 ? added+'日分' : ''}登録しました！` : 'すでに登録済みです');
    setLoading(false);
  }
 
  // 削除（個別）
  async function deleteItem(id) {
    setLoading(true);
    try {
      await gasGet({action:'delete', id});
      items = items.filter(it=>it.id!==id);
      renderCalendar(); renderList();
      showToast('🗑️ 削除しました');
    } catch(e){ showToast('⚠️ 削除に失敗しました'); }
    setLoading(false);
  }
 
  // ショートステイの連続日グループを「まとめ」にする
  function groupShortItems(shortItems) {
    // 日付でソート済み前提
    const groups = [];
    let group = null;
    for (const it of shortItems) {
      if (!group) { group = { ids:[it.id], start:it.date, end:it.date }; continue; }
      // 前日の翌日かチェック
      const prev = new Date(group.end+'T00:00:00');
      prev.setDate(prev.getDate()+1);
      if (toDateStr(prev) === it.date) {
        group.end = it.date;
        group.ids.push(it.id);
      } else {
        groups.push(group);
        group = { ids:[it.id], start:it.date, end:it.date };
      }
    }
    if (group) groups.push(group);
    return groups;
  }
 
  // リスト描画
  function renderList() {
    const list = document.getElementById('scheduleList');
    const now  = new Date(); now.setHours(0,0,0,0);
    let filtered = items.filter(it => new Date(it.date+'T00:00:00')>=now);
    if (currentTab!=='all') filtered = filtered.filter(it=>it.category===currentTab);
    list.innerHTML = '';
 
    const shortItems = filtered.filter(it=>it.category==='short');
    const otherItems = filtered.filter(it=>it.category!=='short');
    const hasShort = (currentTab==='all'||currentTab==='short') && shortItems.length>0;
    const hasOther = (currentTab==='all'||currentTab==='masa'||currentTab==='atsu') && otherItems.length>0;
 
    if (!hasShort && !hasOther) { list.innerHTML='<p class="empty-msg">登録されていません</p>'; return; }
 
    // ショートステイはグループ表示
    if (hasShort) {
      const groups = groupShortItems(shortItems);
      groups.forEach(g => {
        const startD = new Date(g.start+'T00:00:00');
        const endD   = new Date(g.end+'T00:00:00');
        const isSameDay = g.start===g.end;
        const rangeLabel = isSameDay
          ? `${startD.getMonth()+1}月${startD.getDate()}日（${DAYS_JA[startD.getDay()]}）`
          : `${startD.getMonth()+1}月${startD.getDate()}日（${DAYS_JA[startD.getDay()]}）〜\n${endD.getMonth()+1}月${endD.getDate()}日（${DAYS_JA[endD.getDay()]}）`;
        const dayCount = g.ids.length;
        const li = document.createElement('li');
        li.innerHTML = `
          <div class="short-block">
            <div class="short-block-icon">🏥</div>
            <div class="short-block-info">
              <span class="short-block-cat">ショートステイ</span>
              <div class="short-block-range">${rangeLabel.replace('\n','<br>')}</div>
              ${!isSameDay ? `<div class="short-block-days">計${dayCount}日間</div>` : ''}
            </div>
            <button class="btn-del-block short-del-btn">削除</button>
          </div>`;
        // IDをdata属性として安全に設定
        const delBtn = li.querySelector('.short-del-btn');
        delBtn._ids = g.ids;
        delBtn.addEventListener('click', () => deleteShortGroup(delBtn._ids));
        list.appendChild(li);
      });
    }
 
    // 正和・敦子は個別表示
    if (hasOther) otherItems.forEach(it => {
      const d   = new Date(it.date+'T00:00:00');
      const cat = it.category;
      const li  = document.createElement('li');
      li.className = `schedule-item ${cat}`;
      li.innerHTML = `
        <div class="item-icon">${CAT_ICON[cat]}</div>
        <div class="item-info">
          <span class="item-cat ${cat}">${CAT_LABEL[cat]}</span>
          <div class="item-date">${d.getMonth()+1}月${d.getDate()}日（${DAYS_JA[d.getDay()]}）</div>
          <div class="item-time ${cat}">${fmtTime(it.timeStart)} 〜 ${fmtTime(it.timeEnd)}</div>
        </div>
        <button class="btn-del" onclick="deleteItem('${it.id}')">削除</button>
      `;
      list.appendChild(li);
    });
  }
 
 
  // ショートステイグループ一括削除
  async function deleteShortGroup(ids) {
    if (!confirm(`このショートステイ（${ids.length}日分）を削除しますか？`)) return;
    setLoading(true);
    for (const id of ids) {
      try { await gasGet({action:'delete', id}); } catch(e){}
    }
    items = items.filter(it=>!ids.includes(it.id));
    renderCalendar(); renderList();
    showToast(`🗑️ ${ids.length}日分削除しました`);
    setLoading(false);
  }
 
  function toDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function fmtTime(t) {
    if (!t || t === '') return '';
    if (typeof t === 'string' && t.includes(':')) {
      const [h, m] = t.split(':');
      const hi = parseInt(h), mi = parseInt(m);
      if (isNaN(hi)) return '';
      return mi === 0 ? `${hi}時` : `${hi}時${mi}分`;
    }
    if (typeof t === 'number') {
      const totalMin = Math.round(t * 24 * 60);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      return m === 0 ? `${h}時` : `${h}時${m}分`;
    }
    return '';
  }
  function showToast(msg) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2600);
  }
  function setLoading(f) { document.getElementById('addBtn').disabled=f; }
 
  startApp();
</script>
